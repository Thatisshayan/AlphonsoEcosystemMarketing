<svg width="400" height="400" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-echo" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(96,184,232,.18)"/>
      <stop offset="100%" stop-color="#060A07"/>
    </radialGradient>
    <filter id="glow-echo">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow-echo">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="#060A07"/>
  <rect width="128" height="128" fill="url(#bg-echo)"/>

