 r=".6" fill="rgba(96,184,232,.08)"/><circle cx="41" cy="77" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="59" cy="77" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="77" cy="77" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="95" cy="77" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="113" cy="77" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="131" cy="77" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="5" cy="95" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="23" cy="95" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="41" cy="95" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="59" cy="95" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="77" cy="95" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="95" cy="95" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="113" cy="95" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="131" cy="95" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="5" cy="113" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="23" cy="113" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="41" cy="113" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="59" cy="113" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="77" cy="113" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="95" cy="113" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="113" cy="113" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="131" cy="113" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="5" cy="131" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="23" cy="131" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="41" cy="131" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="59" cy="131" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="77" cy="131" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="95" cy="131" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="113" cy="131" r=".6" fill="rgba(96,184,232,.08)"/><circle cx="131" cy="131" r=".6" fill="rgba(96,184,232,.08)"/>

  <!-- Outer hex ring -->
