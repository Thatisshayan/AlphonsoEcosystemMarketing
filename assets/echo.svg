  <circle cx="64" cy="64" r="34" fill="rgba(96,184,232,.06)" filter="url(#softglow-echo)"/>

  <!-- Role icon -->
  <g filter="url(#glow-echo)" transform="translate(0,0)">
    <circle cx="64" cy="64" r="28" fill="none" stroke="rgba(96,184,232,.3)" stroke-width="1.5"/>
           <circle cx="64" cy="64" r="18" fill="none" stroke="rgba(96,184,232,.5)" stroke-width="1"/>
           <circle cx="64" cy="64" r="6" fill="rgba(96,184,232,.8)"/>
           <line x1="92.0" y1="64.0" x2="100.0" y2="64.0" stroke="rgba(96,184,232,.4)" stroke-width="1"/><line x1="78.0" y1="88.2" x2="82.0" y2="95.2" stroke="rgba(96,184,232,.4)" stroke-width="1"/><line x1="50.0" y1="88.2" x2="46.0" y2="95.2" stroke="rgba(96,184,232,.4)" stroke-width="1"/><line x1="36.0" y1="64.0" x2="28.0" y2="64.0" stroke="rgba(96,184,232,.4)" stroke-width="1"/><line x1="50.0" y1="39.8" x2="46.0" y2="32.8" stroke="rgba(96,184,232,.4)" stroke-width="1"/><line x1="78.0" y1="39.8" x2="82.0" y2="32.8" stroke="rgba(96,184,232,.4)" stroke-width="1"/>
  </g>

  <!-- Initial letter -->
  <text x="64" y="72" text-anchor="middle" dominant-baseline="middle"
    font-family="Syne, sans-serif" font-weight="800" font-size="52"
    fill="#60B8E8" opacity=".12" letter-spacing="-2">E</text>

  <!-- Corner scan lines -->
  <line x1="0" y1="0" x2="20" y2="0" stroke="rgba(96,184,232,.3)" stroke-width=".5"/>
  <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(96,184,232,.3)" stroke-width=".5"/>
  <line x1="128" y1="0" x2="108" y2="0" stroke="rgba(96,184,232,.3)" stroke-width=".5"/>
  <line x1="128" y1="0" x2="128" y2="20" stroke="rgba(96,184,232,.3)" stroke-width=".5"/>
  <line x1="0" y1="128" x2="20" y2="128" stroke="rgba(96,184,232,.3)" stroke-width=".5"/>
  <line x1="0" y1="128" x2="0" y2="108" stroke="rgba(96,184,232,.3)" stroke-width=".5"/>
  <line x1="128" y1="128" x2="108" y2="128" stroke="rgba(96,184,232,.3)" stroke-width=".5"/>
  <line x1="128" y1="128" x2="128" y2="108" stroke="rgba(96,184,232,.3)" stroke-width=".5"/>

  <!-- Label at bottom -->
  <rect x="28" y="107" width="72" height="14" rx="2"
    fill="rgba(96,184,232,.08)" stroke="rgba(96,184,232,.2)" stroke-width=".5"/>
  <text x="64" y="115" text-anchor="middle" dominant-baseline="middle"
    font-family="Syne, sans-serif" font-weight="700" font-size="5.5"
    fill="#60B8E8" letter-spacing="2">MEMORY</text>
