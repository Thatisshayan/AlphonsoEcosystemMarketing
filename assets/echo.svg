    fill="none" stroke="rgba(96,184,232,.25)" stroke-width=".6"/>

  <!-- Inner hex frame -->
  <polygon points="64,26 98,44 98,80 64,98 30,80 30,44"
    fill="rgba(96,184,232,.04)" stroke="#60B8E8" stroke-width="1.2"/>

