 r=".6" fill="rgba(255,208,64,.08)"/><circle cx="41" cy="77" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="59" cy="77" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="77" cy="77" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="95" cy="77" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="113" cy="77" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="131" cy="77" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="5" cy="95" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="23" cy="95" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="41" cy="95" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="59" cy="95" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="77" cy="95" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="95" cy="95" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="113" cy="95" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="131" cy="95" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="5" cy="113" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="23" cy="113" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="41" cy="113" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="59" cy="113" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="77" cy="113" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="95" cy="113" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="113" cy="113" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="131" cy="113" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="5" cy="131" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="23" cy="131" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="41" cy="131" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="59" cy="131" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="77" cy="131" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="95" cy="131" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="113" cy="131" r=".6" fill="rgba(255,208,64,.08)"/><circle cx="131" cy="131" r=".6" fill="rgba(255,208,64,.08)"/>

  <!-- Outer hex ring -->
  <polygon points="64,8 112,34 112,86 64,112 16,86 16,34"
    fill="none" stroke="rgba(255,208,64,.15)" stroke-width=".8"/>

  <!-- Middle hex ring -->
  <polygon points="64,18 104,40 104,82 64,104 24,82 24,40"
    fill="none" stroke="rgba(255,208,64,.25)" stroke-width=".6"/>

  <!-- Inner hex frame -->
  <polygon points="64,26 98,44 98,80 64,98 30,80 30,44"
    fill="rgba(255,208,64,.04)" stroke="#FFD040" stroke-width="1.2"/>

  <!-- Glow centre -->
  <circle cx="64" cy="64" r="34" fill="rgba(255,208,64,.06)" filter="url(#softglow-nova)"/>

  <!-- Role icon -->
  <g filter="url(#glow-nova)" transform="translate(0,0)">
    <polygon points="64,36 72,56 94,56 77,68 83,90 64,77 45,90 51,68 34,56 56,56" fill="none" stroke="rgba(255,208,64,.6)" stroke-width="1.5"/>
           <polygon points="64,46 69,58 83,58 72,65 76,78 64,70 52,78 56,65 45,58 59,58" fill="rgba(255,208,64,.15)" stroke="rgba(255,208,64,.3)" stroke-width="1"/>
  </g>

  <!-- Initial letter -->
  <text x="64" y="72" text-anchor="middle" dominant-baseline="middle"
    font-family="Syne, sans-serif" font-weight="800" font-size="52"
    fill="#FFD040" opacity=".12" letter-spacing="-2">N</text>

  <!-- Corner scan lines -->
  <line x1="0" y1="0" x2="20" y2="0" stroke="rgba(255,208,64,.3)" stroke-width=".5"/>
  <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(255,208,64,.3)" stroke-width=".5"/>
  <line x1="128" y1="0" x2="108" y2="0" stroke="rgba(255,208,64,.3)" stroke-width=".5"/>
  <line x1="128" y1="0" x2="128" y2="20" stroke="rgba(255,208,64,.3)" stroke-width=".5"/>
  <line x1="0" y1="128" x2="20" y2="128" stroke="rgba(255,208,64,.3)" stroke-width=".5"/>
  <line x1="0" y1="128" x2="0" y2="108" stroke="rgba(255,208,64,.3)" stroke-width=".5"/>
  <line x1="128" y1="128" x2="108" y2="128" stroke="rgba(255,208,64,.3)" stroke-width=".5"/>
  <line x1="128" y1="128" x2="128" y2="108" stroke="rgba(255,208,64,.3)" stroke-width=".5"/>

  <!-- Label at bottom -->
  <rect x="28" y="107" width="72" height="14" rx="2"
    fill="rgba(255,208,64,.08)" stroke="rgba(255,208,64,.2)" stroke-width=".5"/>
  <text x="64" y="115" text-anchor="middle" dominant-baseline="middle"
    font-family="Syne, sans-serif" font-weight="700" font-size="5.5"
    fill="#FFD040" letter-spacing="2">INTELLIGENCE</text>
</svg>