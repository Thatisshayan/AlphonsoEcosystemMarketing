<svg width="400" height="400" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-nova" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,208,64,.18)"/>
      <stop offset="100%" stop-color="#060A07"/>
    </radialGradient>
    <filter id="glow-nova">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow-nova">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="#060A07"/>
  <rect width="128" height="128" fill="url(#bg-nova)"/>

  <!-- Dot grid -->
