  <!-- Outer hex ring -->
  <polygon points="64,8 112,34 112,86 64,112 16,86 16,34"
    fill="none" stroke="rgba(255,96,96,.15)" stroke-width=".8"/>

  <!-- Middle hex ring -->
  <polygon points="64,18 104,40 104,82 64,104 24,82 24,40"
    fill="none" stroke="rgba(255,96,96,.25)" stroke-width=".6"/>

  <!-- Inner hex frame -->
  <polygon points="64,26 98,44 98,80 64,98 30,80 30,44"
    fill="rgba(255,96,96,.04)" stroke="#FF6060" stroke-width="1.2"/>

  <!-- Glow centre -->
  <circle cx="64" cy="64" r="34" fill="rgba(255,96,96,.06)" filter="url(#softglow-sentinel)"/>

  <!-- Role icon -->
  <g filter="url(#glow-sentinel)" transform="translate(0,0)">
    <path d="M64 34 L82 42 L82 62 Q82 76 64 84 Q46 76 46 62 L46 42 Z" fill="rgba(255,96,96,.08)" stroke="rgba(255,96,96,.5)" stroke-width="1.5"/>
           <path d="M64 42 L76 48 L76 62 Q76 72 64 78 Q52 72 52 62 L52 48 Z" fill="rgba(255,96,96,.06)" stroke="rgba(255,96,96,.3)" stroke-width="1"/>
           <circle cx="64" cy="59" r="4" fill="rgba(255,96,96,.7)"/>
  </g>

  <!-- Initial letter -->
  <text x="64" y="72" text-anchor="middle" dominant-baseline="middle"
    font-family="Syne, sans-serif" font-weight="800" font-size="52"
    fill="#FF6060" opacity=".12" letter-spacing="-2">S</text>

  <!-- Corner scan lines -->
  <line x1="0" y1="0" x2="20" y2="0" stroke="rgba(255,96,96,.3)" stroke-width=".5"/>
  <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(255,96,96,.3)" stroke-width=".5"/>
  <line x1="128" y1="0" x2="108" y2="0" stroke="rgba(255,96,96,.3)" stroke-width=".5"/>
  <line x1="128" y1="0" x2="128" y2="20" stroke="rgba(255,96,96,.3)" stroke-width=".5"/>
  <line x1="0" y1="128" x2="20" y2="128" stroke="rgba(255,96,96,.3)" stroke-width=".5"/>
  <line x1="0" y1="128" x2="0" y2="108" stroke="rgba(255,96,96,.3)" stroke-width=".5"/>
  <line x1="128" y1="128" x2="108" y2="128" stroke="rgba(255,96,96,.3)" stroke-width=".5"/>
  <line x1="128" y1="128" x2="128" y2="108" stroke="rgba(255,96,96,.3)" stroke-width=".5"/>

  <!-- Label at bottom -->
  <rect x="28" y="107" width="72" height="14" rx="2"
    fill="rgba(255,96,96,.08)" stroke="rgba(255,96,96,.2)" stroke-width=".5"/>
  <text x="64" y="115" text-anchor="middle" dominant-baseline="middle"
    font-family="Syne, sans-serif" font-weight="700" font-size="5.5"
    fill="#FF6060" letter-spacing="2">SECURITY</text>
</svg>